services:
  mysql:
    image: mysql:8.4
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: financial_db
      MYSQL_USER: machine_user
      MYSQL_PASSWORD: P@$$vv0rd
    restart: always
    command: 
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/financial_db_mysql
      - ./databases/database.sql:/docker-entrypoint-initdb.d/database.sql

  redis:
    image: redis:7
    container_name: redis-db
    restart: always
    command: redis-server --requirepass P@$$vv0rd
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data: